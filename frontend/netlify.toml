[build]
  command = "npm run build"
  publish = "dist"

# SPA routing: redirect all requests to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# API proxy: redirect /api requests to your backend
[[redirects]]
  from = "/api/*"
  to = "https://pdfcraft-production-e073.up.railway.app/api/:splat"
  status = 200
  force = true
